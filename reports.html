<div class="p-6 space-y-8 animate-in fade-in duration-500">
    <!-- KPI Dashboard Section -->
    <div id="reports-kpi-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- KPI Widgets will be injected here -->
        <div class="h-32 bg-gray-100 rounded-2xl animate-pulse"></div>
        <div class="h-32 bg-gray-100 rounded-2xl animate-pulse"></div>
        <div class="h-32 bg-gray-100 rounded-2xl animate-pulse"></div>
        <div class="h-32 bg-gray-100 rounded-2xl animate-pulse"></div>
    </div>

    <!-- Advanced Filter Bar -->
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-4">
        <div class="flex flex-col lg:flex-row lg:items-center gap-4">
            <!-- Search -->
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="report-search-input" oninput="handleReportFilterChange()" 
                    placeholder="Search assets, descriptions, or categories..." 
                    class="w-full pl-11 pr-4 py-2.5 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-sm">
            </div>

            <!-- Filters Group -->
            <div class="flex flex-wrap items-center gap-3">
                <!-- Category Multi-select (simplified for now as a single select for UX clarity in vanilla) -->
                <select id="report-filter-category" onchange="handleReportFilterChange()" 
                    class="bg-gray-50 border-none rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                    <option value="">All Categories</option>
                    <!-- Categories injected here -->
                </select>

                <select id="report-filter-status" onchange="handleReportFilterChange()" 
                    class="bg-gray-50 border-none rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                    <option value="">All Status</option>
                    <option value="In Stock">In Stock</option>
                    <option value="Available">Available</option>
                    <option value="Low Stock">Low Stock</option>
                    <option value="Out of Stock">Out of Stock</option>
                </select>

                <select id="report-sort-by" onchange="handleReportFilterChange()" 
                    class="bg-gray-50 border-none rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                    <option value="newest">Sort: Newest First</option>
                    <option value="stock-low">Sort: Stock (Low to High)</option>
                    <option value="stock-high">Sort: Stock (High to Low)</option>
                    <option value="alpha">Sort: Alphabetical</option>
                </select>

                <!-- View Toggle -->
                <div class="flex items-center bg-gray-100 p-1 rounded-xl">
                    <button onclick="setReportView('card')" id="view-toggle-card" 
                        class="p-2 rounded-lg transition-all text-indigo-600 bg-white shadow-sm">
                        <i class="fa-solid fa-grip"></i>
                    </button>
                    <button onclick="setReportView('table')" id="view-toggle-table" 
                        class="p-2 rounded-lg transition-all text-gray-500 hover:bg-gray-200">
                        <i class="fa-solid fa-list"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Data Display Section -->
    <div id="report-content-area" class="min-h-[400px]">
        <!-- Cards View -->
        <div id="report-cards-view" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Cards injected here -->
        </div>

        <!-- Table View (Hidden by default) -->
        <div id="report-table-view" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100">
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Asset Name</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Category</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Qty</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Unit Cost</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Date</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="report-table-body" class="divide-y divide-gray-50">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination Controls -->
        <div id="report-pagination-container" class="mt-8 hidden">
            <!-- Pagination injected here -->
        </div>
    </div>

    <!-- Floating Action Button for Special Report -->
    <button onclick="toggleSpecialReportDrawer(true)" 
        class="fixed bottom-8 right-8 bg-indigo-600 text-white p-4 rounded-2xl shadow-2xl hover:bg-indigo-700 hover:scale-110 transition-all z-40 group">
        <i class="fa-solid fa-file-export mr-2 group-hover:rotate-12 transition-transform"></i>
        <span class="font-semibold">Generate Special Report</span>
    </button>
</div>

<!-- Special Report Side Drawer (Off-canvas) -->
<div id="report-drawer-overlay" onclick="toggleSpecialReportDrawer(false)" 
    class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300">
</div>
<div id="report-drawer" 
    class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl z-[51] translate-x-full transition-transform duration-300 ease-out overflow-y-auto">
    <div class="p-6 space-y-8">
        <div class="flex items-center justify-between border-b pb-4">
            <h2 class="text-xl font-bold text-gray-800">Special Report Builder</h2>
            <button onclick="toggleSpecialReportDrawer(false)" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                <i class="fa-solid fa-xmark text-gray-500"></i>
            </button>
        </div>

        <div class="space-y-6">
            <!-- Report Type -->
            <div class="space-y-2">
                <label class="text-sm font-semibold text-gray-700">Report Template</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="selectReportTemplate('inventory')" class="report-template-btn active p-4 border-2 border-indigo-600 bg-indigo-50 rounded-xl text-left transition-all">
                        <i class="fa-solid fa-boxes-stacked text-indigo-600 mb-2 block text-xl"></i>
                        <span class="font-bold block text-sm">Inventory</span>
                        <span class="text-xs text-gray-500">Full stock overview</span>
                    </button>
                    <button onclick="selectReportTemplate('par')" class="report-template-btn p-4 border-2 border-gray-100 hover:border-indigo-200 rounded-xl text-left transition-all">
                        <i class="fa-solid fa-file-signature text-gray-400 mb-2 block text-xl"></i>
                        <span class="font-bold block text-sm">PAR Form</span>
                        <span class="text-xs text-gray-500">Property Receipt</span>
                    </button>
                </div>
            </div>

            <!-- Configuration -->
            <div class="space-y-4 pt-4 border-t">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700">Officer in Charge</label>
                    <input type="text" id="drawer-report-officer" placeholder="Enter name..." 
                        class="w-full border rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500">
                </div>
                
                <div id="drawer-project-group" class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700">Project (Optional)</label>
                    <input type="text" id="drawer-report-project" placeholder="e.g. DICT O&M" 
                        class="w-full border rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700">Columns to Include</label>
                    <div id="drawer-column-checklist" class="grid grid-cols-2 gap-2 p-3 bg-gray-50 rounded-xl border border-gray-100">
                        <!-- Column checkboxes injected here -->
                    </div>
                </div>
            </div>

            <div class="pt-6">
                <button onclick="handleDrawerReportGenerate()" 
                    class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all active:scale-95">
                    Generate & Preview Report
                </button>
                <p class="text-center text-xs text-gray-400 mt-4">
                    Report will open in a printable editor view
                </p>
            </div>
        </div>
    </div>
</div>
